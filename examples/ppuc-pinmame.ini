# Example runtime configuration for ppuc-pinmame.
#
# Precedence:
# 1. Built-in defaults
# 2. Values from this ini file via --ini-file
# 3. Dedicated command line options, which override ini values at runtime

[Paths]
# Required unless passed with -c/--config.
ConfigFile = examples/t2.yml

# Optional ROM name or path. Overrides the ROM from the game YAML.
Rom =

# Optional serial device path. Overrides the serial device from the game YAML.
Serial =

# Optional PinMAME base folder. Defaults to the per-user pinmame folder.
# Linux/macOS example: /home/pi/.pinmame/
# Windows example: D:\PinMAME\
PinmamePath =

# Optional Lua rules file or directory.
Rules =

# Optional comma-separated MP3 playlist for gameplay background music.
MusicFiles =

# Optional gap between background music tracks in milliseconds.
MusicGapMs = 2000

# Optional translite image for in-game mode.
Translite =

# Optional translite image for attract mode.
TransliteAttract =

[Backbox]
# Optional DMD/backbox host address.
Address =

# Optional DMD/backbox TCP port.
Port = 6789

[Runtime]
# Skip serial communication to the boards entirely.
NoSerial = false

# Disable game audio output.
NoSound = false

# Enable full debug output.
Debug = false

# Enable communication/protocol error details without full debug.
DebugErrors = false

# Enable switch debug output.
DebugSwitches = false

# Enable coil debug output.
DebugCoils = false

# Enable lamp debug output.
DebugLamps = false

# Enable effect trigger debug output.
DebugEffects = false

# Enable Serum colorization.
Serum = false

# Serum timeout in milliseconds to ignore unknown frames.
SerumTimeout = 0

# Serum number of unknown frames to skip.
SerumSkipFrames = 0

# Enable PUP video capture/matching.
PUP = false

# Render the DMD in the terminal.
ConsoleDisplay = false

# Write DMD txt dump files.
DumpDisplay = false

# CSV list of configured boards to skip, for example: 2,4,7
SkipBoards =

# Per-board switch reply delay in microseconds.
SwitchReplyDelayUs = 2000

# Re-read all switches after this many ms without non-button switch updates.
# Must be greater than 0 because switch refresh is always active.
SwitchRefreshIdleMs = 15000

# Runtime output frame interval in milliseconds. Lower values increase switch
# poll cadence but leave less idle time for the host and IO boards.
OutputFrameIntervalMs = 4

# Enable host-side ball search for older ROMs without native ball search.
BallSearch = false

# Start ball search after this many ms without non-button switch activity while
# the game-on solenoid indicates that a game is running.
BallSearchDelayMs = 15000

# Delay between complete ball-search coil rounds.
BallSearchRoundDelayMs = 5000

# Number of frames a coil hold stays asserted in libppuc.
CoilHoldFrames = 3

# Force the configured coin-door-closed switch closed when virtualized.
CloseCoinDoor = false

# Use hard reset instead of soft restart on board startup.
HardReset = false

[OutputFilters]
# Radius in pixels for black rounded corners on local DMD outputs.
# Applied after colorization and not included in dumps.
RoundedCorners = 0

[ZeDMD]
# Set to 1 if ZeDMD is attached via USB.
Enabled = 1

# Disable auto-detection and provide a fixed serial port.
Device =

# Set to 1 to enable ZeDMD debug mode.
Debug = 0

# Overwrite ZeDMD internal brightness setting. Valid values are 0-15. -1 disables the setting.
Brightness = -1

[ZeDMD-WiFi]
# Set to 1 if ZeDMD-WiFi is available.
Enabled = 0

# Enter your ZeDMD-WiFi network address here.
# Use a fixed IP or resolvable hostname, for example: 192.168.1.50 or zedmd-wifi.local
WiFiAddr =

[ZeDMD-SPI]
# Set to 1 if ZeDMD-SPI is available.
Enabled = 0

# Speed in Hz.
Speed = 72000000

# Forced pause between frames in milliseconds.
FramePause = 2

# Enter your panel layout as it is not detected automatically via SPI.
Width = 128
Height = 32

[Pixelcade]
# Set to 1 if Pixelcade is attached.
Enabled = 0

# Disable auto-detection and provide a fixed serial port.
Device =

[PIN2DMD]
# Set to 1 if PIN2DMD is attached.
Enabled = 0

[Speech]
# Enable speech callouts.
Enabled = false

# Speak a startup greeting.
Greeting = false

# Speech backend: auto, flite, espeak-ng
Backend = auto

# Optional speech voice name.
Voice =

# Optional speech rate in words per minute, mainly for espeak-ng.
Rate =

# Optional speech pitch 0-100, mainly for espeak-ng.
Pitch =

[BenchTest]
# Enable one of the bench test modes below.
SwitchTest = false
CoilTest = false
LampTest = false
GITest = false
FlasherTest = false

# Interactive selection mode for coil/lamp/flasher tests.
Interactive = false

# Optional specific coil/lamp/GI/flasher number for bench tests.
Number = 0

[Translite]
# Show the translite in a window instead of fullscreen.
Window = false

# Translite window width.
Width = 1920

# Translite window height.
Height = 1080

# Target screen index, or -1 for default placement.
Screen = -1

[VirtualDMD]
# Enable the SDL virtual DMD window.
Enabled = false

# Use HD virtual DMD size (256x64 logical output instead of 128x32).
HD = false

# Show the virtual DMD in a window instead of fullscreen.
Window = false

# Virtual DMD window width.
Width = 1280

# Virtual DMD window height.
Height = 320

# Target screen index, or -1 for default placement.
Screen = -1

# X position relative to the selected screen.
X = 0

# Y position relative to the selected screen.
Y = 0

# Rotation in degrees: 0, 90, 180, 270
Rotation = 0

# Virtual DMD renderer: dots, squares, scale2x, scale4x, scale2x-dots, scale4x-dots, scale2x-squares, scale4x-squares, smooth, xbrz
Renderer = dots
